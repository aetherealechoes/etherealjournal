const KP="ee_",HP="ethereal_echoes_v1";
const LIC_SECRET="ethereal_echoes_sacred";

// ── LICENSE KEY VALIDATION ────────────────────────────────────────────────────
function validateLicenseKey(key){
  const clean=key.trim().toUpperCase().replace(/\s/g,"");
  const parts=clean.split("-");
  if(parts.length!==4||parts[0]!=="EJ")return false;
  const valid32="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  for(let p=1;p<=2;p++){if(parts[p].length!==5)return false;for(const c of parts[p])if(!valid32.includes(c))return false;}
  if(parts[3].length!==5)return false;
  const payload=parts[1]+parts[2];
  let hash=5381;
  const combined=payload+LIC_SECRET;
  for(let i=0;i<combined.length;i++)hash=Math.imul(hash,33)^combined.charCodeAt(i);
  const h=(hash>>>0).toString(16).toUpperCase();
  const expected=h.slice(-5).padStart(5,"0");
  return parts[3]===expected;
}

// ── CRYPTO ────────────────────────────────────────────────────────────────────
async function hashStr(s){try{const b=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(s+HP));return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,"0")).join("");}catch(e){console.error("hashStr failed:",e);throw e;}}
async function deriveKey(pw,salt){const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),{name:"PBKDF2"},false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:100000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);}
async function encJSON(data,pw){const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},await deriveKey(pw,salt),new TextEncoder().encode(JSON.stringify(data)));const out=new Uint8Array(28+ct.byteLength);out.set(salt);out.set(iv,16);out.set(new Uint8Array(ct),28);return btoa(String.fromCharCode(...out));}
async function decJSON(b64,pw){try{const r=Uint8Array.from(atob(b64),c=>c.charCodeAt(0)),pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:r.slice(16,28)},await deriveKey(pw,r.slice(0,16)),r.slice(28));return JSON.parse(new TextDecoder().decode(pt));}catch{return null;}}
const genPhrase=()=>Array.from({length:12},()=>WORDS[Math.floor(Math.random()*WORDS.length)]).join(" ");

// ── SOUNDS ────────────────────────────────────────────────────────────────────
function getCtx(){const C=window.AudioContext||window.webkitAudioContext;return C?new C():null;}
function osc(ctx,freq,type,peak,atk,dec,start=0){const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime+start);g.gain.setValueAtTime(0.0001,ctx.currentTime+start);g.gain.linearRampToValueAtTime(peak,ctx.currentTime+start+atk);g.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+start+atk+dec);o.start(ctx.currentTime+start);o.stop(ctx.currentTime+start+atk+dec+0.1);}
const SND={bowl:c=>{osc(c,432,"sine",.35,.06,3.8);osc(c,432*2.76,"sine",.12,.06,2.8);osc(c,432*5.4,"sine",.05,.06,1.8);},crystal:c=>{osc(c,528,"sine",.30,.04,3.5);osc(c,528*2,"sine",.10,.04,2.8);osc(c,528*3,"sine",.05,.04,2.0);},gong:c=>{osc(c,110,"sine",.45,.02,5.0);osc(c,110*1.41,"sine",.20,.02,4.0);osc(c,110*2,"sine",.10,.02,3.0);},tingsha:c=>{osc(c,880,"sine",.40,.005,2.0);osc(c,880*2.76,"sine",.15,.005,1.4);osc(c,900,"sine",.25,.005,1.8,.08);},om:c=>{osc(c,136.1,"sine",.28,.5,3.2);osc(c,136.1*2,"sine",.12,.5,3.0);osc(c,136.1*.5,"sine",.10,.8,3.5);}};
function playSound(id){const c=getCtx();if(c)SND[id]?.(c);}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){

<div class="timer-presets">${[3,5,10,15,20].map(m=>`<button class="btn-ghost btn-sm" data-preset="${m}">${m} min</button>`).join("")}</div>
<div style="text-align:center"><button class="btn-gold" id="start-timer">Begin Visualization ✦</button><p style="color:#4a4368;font-size:.72rem;margin-top:12px;font-style:italic">Will play: ${TIMER_SOUNDS.find(x=>x.id===S.sound)?.icon} ${TIMER_SOUNDS.find(x=>x.id===S.sound)?.label}</p></div>`
:`<div style="text-align:center"><div class="timer-ring-wrap">
<svg class="timer-ring" width="210" height="210"><circle cx="105" cy="105" r="90" fill="none" stroke="rgba(201,162,39,.1)" stroke-width="7"/><circle id="timer-arc" cx="105" cy="105" r="90" fill="none" stroke="url(#tg)" stroke-width="7" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round" style="transition:stroke-dashoffset 1s linear"/><defs><linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#c9a227"/><stop offset="100%" stop-color="#f0d060"/></linearGradient></defs></svg>
<div class="timer-display">${S.tDone?`<span class="timer-done-emoji">✨</span><p class="timer-done-txt">COMPLETE</p>`:`<span class="timer-time" id="timer-txt">${fmt(S.tLeft)}</span>`}</div></div>
<div class="row" style="justify-content:center">${!S.tDone?`<button class="btn-gold" id="pause-resume">${S.tRunning?"⏸ Pause":"▶ Resume"}</button>`:""}<button class="btn-ghost" id="reset-timer">Reset</button></div></div>`}
<div class="quote-box">"Close your eyes. See your dream as already real. Feel the emotions, the gratitude, the joy. The universe responds to the vibration you hold."</div>
</div>`;}

// ── AFFIRMATIONS ──────────────────────────────────────────────────────────────
function affirmHTML(){return`<div class="card"><h2 class="sec">✦ DAILY AFFIRMATIONS</h2>
<div class="affirmation-display"><p class="affirmation-text">"${esc(AFFIRMATIONS[S.aIdx])}"</p></div>
<div class="row" style="justify-content:center;margin-bottom:28px">
  <button class="btn-ghost" id="aff-prev">← Previous</button><button class="btn-gold" id="aff-rnd">✦ New Affirmation</button><button class="btn-ghost" id="aff-next">Next →</button>
</div>
${AFFIRMATIONS.map((a,i)=>`<div class="affirmation-card ${S.aIdx===i?"active":""}" data-aff="${i}">"${esc(a)}"</div>`).join("")}
</div>`;}

// ── VISUALIZE ─────────────────────────────────────────────────────────────────
function vizHTML(){if(!S.selViz)return`<div class="card"><h2 class="sec">✦ GUIDED VISUALIZATIONS</h2><p class="muted" style="margin-bottom:22px">Choose an exercise to deepen your manifestation practice.</p>${VISUALIZATIONS.map((v,i)=>`<div class="viz-card" data-viz="${i}"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><h3 style="color:#c9a227;font-size:1rem;letter-spacing:1px">✦ ${esc(v.title)}</h3><span style="color:#4a4368;font-size:.78rem">${v.duration}</span></div><p class="muted" style="font-style:italic">${esc(v.steps[0])}</p></div>`).join("")}</div>`;
return`<div class="card"><button class="btn-ghost" id="viz-back" style="margin-bottom:20px">← Back</button><h2 class="sec">✦ ${esc(S.selViz.title.toUpperCase())}</h2><p style="color:#4a4368;font-size:.75rem;letter-spacing:2px;margin-bottom:22px">RECOMMENDED: ${S.selViz.duration}</p>${S.selViz.steps.map((step,i)=>`<div class="viz-step"><div class="viz-num">${i+1}</div><p style="color:#e8d5b7;line-height:1.75;font-size:.95rem;padding-top:4px">${esc(step)}</p></div>`).join("")}<div style="text-align:center;margin-top:24px"><button class="btn-gold" id="viz-timer">Open Timer for This ✦</button></div></div>`;}

// ── APP EVENTS ────────────────────────────────────────────────────────────────
function attachAppEvents(){
  document.querySelectorAll("[data-tab]").forEach(b=>b.addEventListener("click",e=>{S.tab=e.currentTarget.dataset.tab;S.selViz=null;render();if(S.tab==="vision")updateBoardScale();}));
  document.getElementById("backup-btn")?.addEventListener("click",()=>{S.showMenu=!S.showMenu;render();});
  document.getElementById("menu-close")?.addEventListener("click",()=>{S.showMenu=false;render();});
  document.getElementById("lock-btn")?.addEventListener("click",lockApp);
  document.getElementById("export-btn")?.addEventListener("click",exportJournal);
  document.getElementById("import-input")?.addEventListener("change",handleImport);
  document.getElementById("next-prompt")?.addEventListener("click",()=>{S.pIdx=(S.pIdx+1)%PROMPTS.length;render();});
  document.getElementById("rnd-prompt")?.addEventListener("click",()=>{S.pIdx=Math.floor(Math.random()*PROMPTS.length);render();});
  document.getElementById("journal-ta")?.addEventListener("input",e=>{S.curEntry=e.target.value;});
  document.querySelectorAll("[data-mood]").forEach(b=>b.addEventListener("click",e=>{const i=parseInt(e.currentTarget.dataset.mood);S.mood=S.mood===i?null:i;document.querySelectorAll(".mood-btn").forEach((b,idx)=>b.classList.toggle("active",idx===S.mood));}));
  document.getElementById("save-entry")?.addEventListener("click",saveEntry);
  document.getElementById("toggle-past")?.addEventListener("click",()=>{S.showPast=!S.showPast;render();});
  document.querySelectorAll("[data-del]").forEach(b=>b.addEventListener("click",e=>{S.entries=S.entries.filter(x=>x.id!==parseInt(e.currentTarget.dataset.del));scheduleSave();render();}));
  document.getElementById("img-input")?.addEventListener("change",handleImgUpload);
  document.getElementById("add-text-btn")?.addEventListener("click",()=>{S.showTxtForm=!S.showTxtForm;render();updateBoardScale();});
  document.getElementById("save-board-btn")?.addEventListener("click",saveVisionBoard);
  document.getElementById("clear-board-btn")?.addEventListener("click",()=>{if(confirm("Clear entire vision board?"))S.boardItems=[];render();scheduleSave();});
  document.getElementById("del-sel-btn")?.addEventListener("click",()=>{S.boardItems=S.boardItems.filter(i=>i.id!==S.selItem);S.selItem=null;render();updateBoardScale();scheduleSave();});
  document.getElementById("fwd-sel-btn")?.addEventListener("click",()=>{const maxZ=Math.max(0,...S.boardItems.map(i=>i.zIndex||0));S.boardItems=S.boardItems.map(i=>i.id===S.selItem?{...i,zIndex:maxZ+1}:i);reRenderBoard();});
  document.querySelectorAll("[data-del-item]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();S.boardItems=S.boardItems.filter(i=>i.id!==e.currentTarget.dataset.delItem);S.selItem=null;reRenderBoard();scheduleSave();}));
  document.querySelectorAll("[data-item]").forEach(el=>{el.addEventListener("mousedown",e=>startDrag(e,el.dataset.item));el.addEventListener("touchstart",e=>startDrag(e,el.dataset.item),{passive:false});});
  document.querySelectorAll("[data-resize-item]").forEach(b=>{b.addEventListener("mousedown",e=>startResize(e,b.dataset.resizeItem));b.addEventListener("touchstart",e=>startResize(e,b.dataset.resizeItem),{passive:false});});
  document.getElementById("txt-input")?.addEventListener("input",e=>S.newText=e.target.value);
  document.querySelectorAll("[data-color]").forEach(b=>b.addEventListener("click",e=>{S.txtColor=e.currentTarget.dataset.color;document.querySelectorAll(".color-swatch").forEach(s=>s.classList.toggle("active",s.dataset.color===S.txtColor));}));
  document.querySelectorAll("[data-size]").forEach(b=>b.addEventListener("click",e=>{S.txtSize=parseInt(e.currentTarget.dataset.size);document.querySelectorAll(".size-btn").forEach(s=>s.classList.toggle("active",parseInt(s.dataset.size)===S.txtSize));}));
  document.getElementById("txt-bold")?.addEventListener("change",e=>S.txtBold=e.target.checked);
  document.getElementById("add-txt-btn")?.addEventListener("click",addTextToBoard);
  document.getElementById("cancel-txt-btn")?.addEventListener("click",()=>{S.showTxtForm=false;render();updateBoardScale();});
  document.getElementById("aud-input")?.addEventListener("change",handleAudUpload);
  document.getElementById("play-btn")?.addEventListener("click",togglePlay);
  document.querySelectorAll("[data-play]").forEach(row=>row.addEventListener("click",e=>{const a=S.audioFiles.find(x=>x.id===e.currentTarget.dataset.play);if(a){S.curAudio=a;S.playing=true;render();const ae=document.getElementById("audio-el");ae.src=a.url;ae.play();}}));
  document.querySelectorAll("[data-del-aud]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();const id=e.currentTarget.dataset.delAud;if(S.curAudio?.id===id){document.getElementById("audio-el")?.pause();S.curAudio=null;S.playing=false;}S.audioFiles=S.audioFiles.filter(a=>a.id!==id);render();}));
  const ae=document.getElementById("audio-el");if(ae)ae.onended=()=>{S.playing=false;render();};
  document.getElementById("t-min")?.addEventListener("input",e=>S.tMin=Math.max(0,Math.min(60,parseInt(e.target.value)||0)));
  document.getElementById("t-sec")?.addEventListener("input",e=>S.tSec=Math.max(0,Math.min(59,parseInt(e.target.value)||0)));
  document.querySelectorAll("[data-preset]").forEach(b=>b.addEventListener("click",e=>{S.tMin=parseInt(e.currentTarget.dataset.preset);S.tSec=0;render();}));
  document.getElementById("start-timer")?.addEventListener("click",startTimer);
  document.getElementById("pause-resume")?.addEventListener("click",()=>{if(S.tRunning){clearInterval(timerInterval);S.tRunning=false;}else{S.tRunning=true;runTimer();}render();});
  document.getElementById("reset-timer")?.addEventListener("click",()=>{clearInterval(timerInterval);S.tRunning=false;S.tStarted=false;S.tDone=false;const t=S.tMin*60+S.tSec;S.tTotal=t;S.tLeft=t;render();});
  document.querySelectorAll("[data-sound]").forEach(b=>b.addEventListener("click",e=>{S.sound=e.currentTarget.dataset.sound;document.querySelectorAll(".sound-card").forEach(c=>c.classList.toggle("active",c.dataset.sound===S.sound));}));
  document.querySelectorAll("[data-preview]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();playSound(e.currentTarget.dataset.preview);}));
  document.getElementById("aff-prev")?.addEventListener("click",()=>{S.aIdx=(S.aIdx-1+AFFIRMATIONS.length)%AFFIRMATIONS.length;render();});
  document.getElementById("aff-rnd")?.addEventListener("click",()=>{S.aIdx=Math.floor(Math.random()*AFFIRMATIONS.length);render();});
  document.getElementById("aff-next")?.addEventListener("click",()=>{S.aIdx=(S.aIdx+1)%AFFIRMATIONS.length;render();});
  document.querySelectorAll("[data-aff]").forEach(b=>b.addEventListener("click",e=>{S.aIdx=parseInt(e.currentTarget.dataset.aff);render();}));
  document.querySelectorAll("[data-viz]").forEach(b=>b.addEventListener("click",e=>{S.selViz=VISUALIZATIONS[parseInt(e.currentTarget.dataset.viz)];render();}));
  document.getElementById("viz-back")?.addEventListener("click",()=>{S.selViz=null;render();});
  document.getElementById("viz-timer")?.addEventListener("click",()=>{S.tab="timer";S.selViz=null;render();});
  document.addEventListener("click",e=>{if(S.tab==="vision"&&!e.target.closest("[data-item]")&&!e.target.closest(".board-toolbar")&&!e.target.closest(".text-form")){if(S.selItem){S.selItem=null;reRenderBoard();}}});
}

// ── JOURNAL ACTIONS ───────────────────────────────────────────────────────────
function saveEntry(){if(!S.curEntry.trim())return;S.entries.push({id:Date.now(),date:today,text:S.curEntry,mood:S.mood,prompt:PROMPTS[S.pIdx]});S.curEntry="";S.mood=null;scheduleSave();render();flash("✦ Entry saved");}

// ── VISION BOARD ──────────────────────────────────────────────────────────────
async function handleImgUpload(e){for(const file of Array.from(e.target.files)){const reader=new FileReader();reader.onload=async ev=>{const src=await resizeImg(ev.target.result);const img=new Image();img.onload=()=>{const aspect=img.width/img.height,w=Math.min(380,img.width),h=w/aspect,maxZ=Math.max(0,...S.boardItems.map(i=>i.zIndex||0));S.boardItems.push({id:String(Date.now()+Math.random()),type:"image",src,x:Math.random()*300+50,y:Math.random()*200+50,width:w,height:h,zIndex:maxZ+1});reRenderBoard();scheduleSave();};img.src=src;};reader.readAsDataURL(file);}}
function addTextToBoard(){if(!S.newText.trim())return;const maxZ=Math.max(0,...S.boardItems.map(i=>i.zIndex||0));S.boardItems.push({id:String(Date.now()),type:"text",text:S.newText,x:BOARD_W/2-150,y:BOARD_H/2-40,fontSize:S.txtSize,color:S.txtColor,bold:S.txtBold,zIndex:maxZ+1});S.newText="";S.showTxtForm=false;render();updateBoardScale();scheduleSave();}
function reRenderBoard(){const bc=document.getElementById("board-canvas");if(bc)bc.innerHTML=boardItemsHTML();document.querySelectorAll("[data-item]").forEach(el=>{el.addEventListener("mousedown",e=>startDrag(e,el.dataset.item));el.addEventListener("touchstart",e=>startDrag(e,el.dataset.item),{passive:false});});document.querySelectorAll("[data-resize-item]").forEach(b=>{b.addEventListener("mousedown",e=>startResize(e,b.dataset.resizeItem));b.addEventListener("touchstart",e=>startResize(e,b.dataset.resizeItem),{passive:false});});document.querySelectorAll("[data-del-item]").forEach(b=>b.addEventListener("click",e=>{e.stopPropagation();S.boardItems=S.boardItems.filter(i=>i.id!==e.currentTarget.dataset.delItem);S.selItem=null;reRenderBoard();scheduleSave();}));}
async function saveVisionBoard(){if(S.boardItems.length===0){flash("Add some images or text first!");return;}flash("✦ Preparing…");const canvas=document.createElement("canvas");canvas.width=BOARD_W;canvas.height=BOARD_H;const ctx=canvas.getContext("2d");const grad=ctx.createLinearGradient(0,0,BOARD_W,BOARD_H);grad.addColorStop(0,"#07071a");grad.addColorStop(.45,"#130a2a");grad.addColorStop(1,"#0b1535");ctx.fillStyle=grad;ctx.fillRect(0,0,BOARD_W,BOARD_H);const sorted=[...S.boardItems].sort((a,b)=>(a.zIndex||0)-(b.zIndex||0));for(const item of sorted){if(item.type==="image"){await new Promise(res=>{const img=new Image();img.onload=()=>{ctx.drawImage(img,item.x,item.y,item.width,item.height);res();};img.onerror=res;img.src=item.src;});}else if(item.type==="text"){ctx.font=`${item.bold?"bold ":""}${item.fontSize}px Georgia,serif`;ctx.fillStyle=item.color;ctx.shadowColor=item.color;ctx.shadowBlur=18;ctx.fillText(item.text,item.x+8,item.y+item.fontSize);ctx.shadowBlur=0;}}const a=document.createElement("a");a.download="my-vision-board.png";a.href=canvas.toDataURL("image/png");a.click();flash("✦ Vision board saved!");}

// ── DRAG / RESIZE ─────────────────────────────────────────────────────────────
let dragState=null,resizeState=null;
function getBoardXY(cx,cy){const bc=document.getElementById("board-canvas");if(!bc)return{x:0,y:0};const r=bc.getBoundingClientRect();return{x:(cx-r.left)*(BOARD_W/r.width),y:(cy-r.top)*(BOARD_H/r.height)};}
function startDrag(e,id){e.stopPropagation();const cx=e.clientX??e.touches?.[0]?.clientX,cy=e.clientY??e.touches?.[0]?.clientY;const{x:bx,y:by}=getBoardXY(cx,cy);const item=S.boardItems.find(i=>i.id===id);if(!item)return;const maxZ=Math.max(0,...S.boardItems.map(i=>i.zIndex||0));S.boardItems=S.boardItems.map(i=>i.id===id?{...i,zIndex:maxZ+1}:i);S.selItem=id;const el=document.getElementById(`item-${id}`);if(el)el.style.zIndex=maxZ+1;dragState={id,ox:bx-item.x,oy:by-item.y};}
function startResize(e,id){e.stopPropagation();const cx=e.clientX??e.touches?.[0]?.clientX,cy=e.clientY??e.touches?.[0]?.clientY;const{x:bx,y:by}=getBoardXY(cx,cy);const item=S.boardItems.find(i=>i.id===id);if(!item)return;resizeState={id,mx:bx,my:by,sw:item.width||200,sh:item.height||60,aspect:item.type==="image"?item.width/item.height:null};}
window.addEventListener("mousemove",onDragMove);window.addEventListener("mouseup",onDragEnd);
window.addEventListener("touchmove",e=>{if(dragState||resizeState){e.preventDefault();onDragMove(e);}},{passive:false});
window.addEventListener("touchend",onDragEnd);
function onDragMove(e){if(!dragState&&!resizeState)return;const cx=e.clientX??e.touches?.[0]?.clientX,cy=e.clientY??e.touches?.[0]?.clientY;const{x:bx,y:by}=getBoardXY(cx,cy);if(dragState){const item=S.boardItems.find(i=>i.id===dragState.id);if(!item)return;const nx=Math.max(0,Math.min(BOARD_W-(item.width||200),bx-dragState.ox)),ny=Math.max(0,Math.min(BOARD_H-(item.height||60),by-dragState.oy));const el=document.getElementById(`item-${dragState.id}`);if(el){el.style.left=nx+"px";el.style.top=ny+"px";}S.boardItems=S.boardItems.map(i=>i.id===dragState.id?{...i,x:nx,y:ny}:i);}if(resizeState){const dx=bx-resizeState.mx,nw=Math.max(60,resizeState.sw+dx),nh=resizeState.aspect?nw/resizeState.aspect:Math.max(30,resizeState.sh+(by-resizeState.my));const el=document.getElementById(`item-${resizeState.id}`);if(el){el.style.width=nw+"px";el.style.height=nh+"px";}S.boardItems=S.boardItems.map(i=>i.id===resizeState.id?{...i,width:nw,height:nh}:i);}}
function onDragEnd(){if(dragState||resizeState)scheduleSave();dragState=null;resizeState=null;}
function updateBoardScale(){const cont=document.getElementById("board-wrapper"),canvas=document.getElementById("board-canvas");if(!cont||!canvas)return;const sc=cont.offsetWidth/BOARD_W;canvas.style.transform=`scale(${sc})`;canvas.style.width=BOARD_W+"px";canvas.style.height=BOARD_H+"px";cont.style.height=(BOARD_H*sc)+"px";}
window.addEventListener("resize",()=>{if(S.tab==="vision")updateBoardScale();});

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function handleAudUpload(e){Array.from(e.target.files).forEach(f=>{S.audioFiles.push({id:String(Date.now()+Math.random()),name:f.name.replace(/\.[^/.]+$/,""),url:URL.createObjectURL(f)});});render();}
function togglePlay(){const ae=document.getElementById("audio-el");if(!ae)return;S.playing?ae.pause():ae.play();S.playing=!S.playing;const pb=document.getElementById("play-btn");if(pb)pb.textContent=S.playing?"⏸":"▶";}

// ── TIMER ─────────────────────────────────────────────────────────────────────
function startTimer(){const t=S.tMin*60+S.tSec;if(!t)return;S.tTotal=t;S.tLeft=t;S.tStarted=true;S.tDone=false;S.defMin=S.tMin;playSound(S.sound);render();S.tRunning=true;runTimer();}
function runTimer(){clearInterval(timerInterval);timerInterval=setInterval(()=>{if(!S.tRunning){clearInterval(timerInterval);return;}S.tLeft--;updateTimerDOM();if(S.tLeft<=0){clearInterval(timerInterval);S.tRunning=false;S.tDone=true;playSound(S.sound);scheduleSave();const tw=document.querySelector(".timer-display");if(tw)tw.innerHTML=`<span class="timer-done-emoji">✨</span><p class="timer-done-txt">COMPLETE</p>`;document.getElementById("pause-resume")?.remove();}},1000);}
function updateTimerDOM(){const arc=document.getElementById("timer-arc"),txt=document.getElementById("timer-txt");const circ=2*Math.PI*90,offset=circ-((S.tTotal-S.tLeft)/S.tTotal)*circ;if(arc)arc.style.strokeDashoffset=offset;if(txt)txt.textContent=fmt(S.tLeft);}

// ── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function exportJournal(){const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([JSON.stringify({app:"Ethereal Journal",exportDate:new Date().toISOString(),entries:S.entries},null,2)],{type:"application/json"}));a.download=`ethereal-journal-${new Date().toISOString().slice(0,10)}.json`;a.click();S.showMenu=false;render();}
function handleImport(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(Array.isArray(d.entries)){const ids=new Set(S.entries.map(x=>x.id));const n=d.entries.filter(x=>!ids.has(x.id));S.entries.push(...n);scheduleSave();render();flash(`✦ Imported ${n.length} entries`);}}catch{flash("Could not read file.");}};r.readAsText(file);S.showMenu=false;}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init(){
  // Check for stored license first — if valid, skip to journal; else show license gate
  const storedLic=localStorage.getItem(`${KP}lic`)||"";
  if(!validateLicenseKey(storedLic)){
    S.screen="license";
  } else {
    S.screen=localStorage.getItem(`${KP}init`)?"locked":"setup";
  }
  render();
}
init();
</script>
